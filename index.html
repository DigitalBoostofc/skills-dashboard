<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Dashboard — Claude Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #050509;
      --bg2:       #09090f;
      --surface:   rgba(255,255,255,0.025);
      --surface-h: rgba(255,255,255,0.045);
      --border:    rgba(255,255,255,0.07);
      --text:      #f0f0fa;
      --text-2:    #8080a8;
      --text-3:    #3c3c60;
      --radius:    14px;
      --ff-display:'Syne', sans-serif;
      --ff-mono:   'JetBrains Mono', monospace;
      --ff-body:   'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 26px 26px;
    }
    body::after {
      content: '';
      position: fixed; top: -200px; right: -200px;
      width: 600px; height: 600px; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(124,211,255,0.05) 0%, transparent 70%);
    }

    /* ── HEADER ───────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(5,5,9,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 62px;
      display: flex; align-items: center; gap: 18px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      text-decoration: none;
    }
    .logo-mark {
      width: 34px; height: 34px;
      border: 1.5px solid #7cd3ff;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-mono); font-size: 15px; font-weight: 600;
      color: #7cd3ff;
      box-shadow: 0 0 14px rgba(124,211,255,0.1);
    }
    .logo-text {
      font-family: var(--ff-display);
      font-size: 16px; font-weight: 800;
      letter-spacing: -.02em; color: var(--text);
    }
    .logo-sub {
      font-size: 11px; color: var(--text-3);
      font-family: var(--ff-mono); letter-spacing: .04em;
    }
    .header-stat {
      font-family: var(--ff-mono); font-size: 11px; color: var(--text-2);
      background: var(--surface); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .header-stat b { color: #7cd3ff; }
    .search-wrap {
      margin-left: auto; position: relative; flex-shrink: 0;
    }
    .search-wrap input {
      width: 270px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px;
      padding: 8px 36px 8px 36px;
      font-size: 13px; font-family: var(--ff-body); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input:focus {
      border-color: #7cd3ff;
      box-shadow: 0 0 0 3px rgba(124,211,255,0.07);
    }
    .search-wrap input::placeholder { color: var(--text-3); }
    .s-ico {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); font-size: 13px; pointer-events: none;
    }
    .s-hint {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-family: var(--ff-mono); font-size: 10px; color: var(--text-3);
      background: var(--bg2); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 5px; pointer-events: none;
    }
    .s-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      display: none; cursor: pointer; color: var(--text-2); font-size: 15px;
    }
    .s-clear.on { display: block; }

    /* ── CATEGORY FILTERS ─────────────────────────── */
    .cat-bar {
      position: sticky; top: 62px; z-index: 40;
      background: rgba(5,5,9,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .cat-bar::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
      padding: 0 16px; height: 52px;
      border: none; background: transparent;
      color: var(--text-2);
      font-family: var(--ff-body); font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      position: relative;
    }
    .cat-btn:hover { color: var(--text); }
    .cat-btn.active {
      color: var(--text);
      border-bottom-color: var(--cat-color, #7cd3ff);
    }
    .cat-btn .cat-icon { font-size: 15px; line-height: 1; }
    .cat-btn .cat-name { font-weight: 500; }
    .cat-btn .cat-count {
      font-family: var(--ff-mono); font-size: 10px;
      background: rgba(255,255,255,0.06);
      padding: 2px 6px; border-radius: 10px;
      color: var(--text-3);
    }
    .cat-btn.active .cat-count {
      background: rgba(255,255,255,0.1);
      color: var(--text-2);
    }

    /* ── MAIN ─────────────────────────────────────── */
    main {
      position: relative; z-index: 1;
      max-width: 1400px; margin: 0 auto;
      padding: 36px 32px 80px;
    }

    /* ── CATEGORY SECTION ─────────────────────────── */
    .cat-section { margin-bottom: 56px; }
    .cat-section[hidden] { display: none; }

    .cat-section-head {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px;
    }
    .cat-section-icon {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .cat-section-info { flex: 1; }
    .cat-section-name {
      font-family: var(--ff-display);
      font-size: 18px; font-weight: 800;
      letter-spacing: -.02em; color: var(--text);
      margin-bottom: 2px;
    }
    .cat-section-desc {
      font-size: 12px; color: var(--text-2);
    }
    .cat-section-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }
    .cat-section-count {
      font-family: var(--ff-mono); font-size: 11px; color: var(--text-3);
    }

    /* ── GRID ─────────────────────────────────────── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    /* ── SKILL CARD ───────────────────────────────── */
    .s-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 18px 16px;
      position: relative; overflow: hidden; cursor: default;
      transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
      opacity: 0; animation: fadeUp .4s ease forwards;
    }
    .s-card:hover {
      background: var(--surface-h);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(0,0,0,0.4);
    }
    .s-card[hidden] { display: none !important; }
    .s-card::before {
      content: '';
      position: absolute; left: 0; top: 16px; bottom: 16px;
      width: 3px;
      background: var(--cat-color, #7cd3ff);
      border-radius: 0 3px 3px 0;
      opacity: .6; transition: opacity .2s;
    }
    .s-card:hover::before { opacity: 1; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      margin-bottom: 7px; padding-left: 12px;
    }
    .card-name {
      font-family: var(--ff-display);
      font-size: 14px; font-weight: 700;
      color: var(--text); line-height: 1.3;
    }
    .card-cmd {
      font-family: var(--ff-mono); font-size: 11px; font-weight: 600;
      color: var(--cat-color, #7cd3ff);
      background: rgba(124,211,255,0.06);
      border: 1px solid rgba(124,211,255,0.15);
      padding: 4px 9px; border-radius: 7px;
      white-space: nowrap; flex-shrink: 0;
      cursor: pointer; user-select: none;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .card-cmd:hover { background: rgba(124,211,255,0.12); border-color: rgba(124,211,255,0.4); }
    .card-cmd:active { transform: scale(0.95); }
    .card-cmd.copied { color: #4ade80; border-color: rgba(74,222,128,0.35); background: rgba(74,222,128,0.07); }

    .card-desc {
      font-size: 12px; color: var(--text-2); line-height: 1.5;
      margin-bottom: 10px; padding-left: 12px;
    }
    .card-bullets {
      list-style: none; display: flex; flex-direction: column; gap: 4px;
      padding-left: 12px; margin-bottom: 12px;
    }
    .card-bullets li {
      font-size: 11.5px; color: var(--text-2);
      display: flex; gap: 8px; align-items: flex-start; line-height: 1.45;
    }
    .card-bullets li::before {
      content: '›'; color: var(--cat-color, #7cd3ff);
      font-weight: 700; font-size: 14px; flex-shrink: 0;
      line-height: 1.2; opacity: .7;
    }
    .card-footer {
      padding-left: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .plugin-tag {
      font-family: var(--ff-mono); font-size: 10px;
      color: var(--text-3); background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 5px;
    }

    /* ── EMPTY ────────────────────────────────────── */
    .empty {
      display: none; text-align: center; padding: 80px 20px;
      z-index: 1; position: relative;
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: .25; }
    .empty-title { font-family: var(--ff-display); font-size: 18px; font-weight: 800; color: var(--text-2); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: var(--text-3); }

    /* ── TOAST ────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: #0e1a12; border: 1px solid rgba(74,222,128,0.3);
      color: #4ade80; font-family: var(--ff-mono); font-size: 12px;
      padding: 10px 18px; border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer {
      position: relative; z-index: 1; text-align: center;
      padding: 20px; font-family: var(--ff-mono); font-size: 11px;
      color: var(--text-3); border-top: 1px solid var(--border);
    }
    footer .hl { color: #7cd3ff; }

    @media (max-width: 680px) {
      header { padding: 0 16px; gap: 10px; }
      .logo-sub, .header-stat { display: none; }
      .search-wrap input { width: 180px; }
      main { padding: 24px 16px 40px; }
      .cat-bar { padding: 0 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">⌘</div>
    <div>
      <div class="logo-text">Skills</div>
      <div class="logo-sub">claude code</div>
    </div>
  </div>
  <div class="header-stat"><b id="stat-skills">0</b> skills · <b id="stat-cats">0</b> categorias</div>
  <div class="search-wrap">
    <span class="s-ico">⌕</span>
    <input type="text" id="search" placeholder="Buscar skill ou /comando..." autocomplete="off" />
    <span class="s-hint">pressione /</span>
    <span class="s-clear" id="s-clear" onclick="clearSearch()">✕</span>
  </div>
</header>

<div class="cat-bar" id="cat-bar">
  <button class="cat-btn active" data-cat="all" style="--cat-color:#7cd3ff" onclick="filterCat('all',this)">
    <span class="cat-icon">✦</span>
    <span class="cat-name">Todos</span>
    <span class="cat-count" id="cnt-all">0</span>
  </button>
</div>

<main id="main"></main>
<div class="empty" id="empty">
  <div class="empty-icon">⌖</div>
  <div class="empty-title">Nada encontrado</div>
  <div class="empty-sub">Tente outro termo ou instale uma nova skill</div>
</div>

<div class="toast" id="toast"></div>

<footer>Atualizado em <span class="hl" id="updated"></span> · <span class="hl" id="footer-cnt">0</span> skills instaladas</footer>

/* ================================================================
   RENDER
   ================================================================ */
let activeCat = 'all';
let searchQ = '';
let toastTmr;

function render() {
  const main  = document.getElementById('main');
  const catBar = document.getElementById('cat-bar');
  let total = 0, delay = 0;

  CATS.forEach(cat => {
    total += cat.skills.length;

    // Filter tab
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat.id;
    btn.style.setProperty('--cat-color', cat.color);
    btn.onclick = function() { filterCat(cat.id, this); };
    btn.innerHTML = `<span class="cat-icon">${cat.icon}</span><span class="cat-name">${cat.name}</span><span class="cat-count" id="cnt-${cat.id}">${cat.skills.length}</span>`;
    catBar.appendChild(btn);

    // Section
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.dataset.cat = cat.id;
    sec.style.setProperty('--cat-color', cat.color);
    sec.innerHTML = `
      <div class="cat-section-head">
        <div class="cat-section-icon">${cat.icon}</div>
        <div class="cat-section-info">
          <div class="cat-section-name">${cat.name}</div>
          <div class="cat-section-desc">${cat.desc}</div>
        </div>
        <div class="cat-section-count" id="sec-cnt-${cat.id}">${cat.skills.length} skills</div>
        <div class="cat-section-line"></div>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'skills-grid';

    cat.skills.forEach(skill => {
      delay += 30;
      const card = document.createElement('div');
      card.className = 's-card';
      card.style.setProperty('--cat-color', cat.color);
      card.style.animationDelay = `${delay}ms`;
      card.dataset.search = (skill.name + ' ' + skill.command + ' ' + skill.desc + ' ' + skill.bullets.join(' ')).toLowerCase();

      card.innerHTML = `
        <div class="card-head">
          <div class="card-name">${skill.name}</div>
          <div class="card-cmd" title="Clique para copiar" onclick="copyCmd('${skill.command}',this)">${skill.command}</div>
        </div>
        <div class="card-desc">${skill.desc}</div>
        <ul class="card-bullets">${skill.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
        <div class="card-footer"><span class="plugin-tag">${skill.plugin}</span></div>
      `;
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });

  document.getElementById('stat-skills').textContent = total;
  document.getElementById('stat-cats').textContent = CATS.length;
  document.getElementById('cnt-all').textContent = total;
  document.getElementById('footer-cnt').textContent = total;
  document.getElementById('updated').textContent = new Date().toLocaleDateString('pt-BR');
}

function filterCat(catId, btn) {
  activeCat = catId;
  searchQ = '';
  document.getElementById('search').value = '';
  document.getElementById('s-clear').classList.remove('on');

  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  let total = 0;

  document.querySelectorAll('.cat-section').forEach(sec => {
    const matchCat = activeCat === 'all' || sec.dataset.cat === activeCat;
    if (!matchCat) { sec.hidden = true; return; }

    let secCount = 0;
    sec.querySelectorAll('.s-card').forEach(card => {
      const ok = !searchQ || card.dataset.search.includes(searchQ);
      card.hidden = !ok;
      if (ok) { secCount++; total++; }
    });
    sec.hidden = secCount === 0;

    const cntEl = sec.querySelector(`[id^="sec-cnt-"]`);
    if (cntEl) cntEl.textContent = `${secCount} skill${secCount !== 1 ? 's' : ''}`;
  });

  document.getElementById('cnt-all').textContent = total;
  document.getElementById('empty').style.display = total === 0 ? 'block' : 'none';
}

function copyCmd(cmd, el) {
  navigator.clipboard.writeText(cmd).then(() => {
    el.classList.add('copied');
    el.textContent = '✓ copiado';
    setTimeout(() => { el.classList.remove('copied'); el.textContent = cmd; }, 1500);
    showToast(`${cmd} copiado!`);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => t.classList.remove('show'), 2000);
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('s-clear').classList.remove('on');
  searchQ = '';
  applyFilters();
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  document.getElementById('s-clear').classList.toggle('on', searchQ.length > 0);
  if (searchQ) {
    activeCat = 'all';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
  }
  applyFilters();
});

document.addEventListener('keydown', e => {
  const inp = document.getElementById('search');
  if (e.key === '/' && document.activeElement !== inp) { e.preventDefault(); inp.focus(); }
  if (e.key === 'Escape' && document.activeElement === inp) { clearSearch(); inp.blur(); }
});

render();
</script>
