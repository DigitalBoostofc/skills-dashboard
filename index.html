<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Dashboard — Claude Code</title>
  <style>
    :root {
      --bg: #0d0d14;
      --bg2: #13131f;
      --bg3: #1a1a2e;
      --surface: #1e1e30;
      --surface2: #252540;
      --border: #2a2a45;
      --text: #e8e8f0;
      --text2: #9898b8;
      --text3: #5a5a80;
      --accent: #7c6af7;
      --accent2: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c6af7, #a78bfa);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
    .header-search {
      margin-left: auto;
      position: relative;
    }
    .header-search input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px 8px 36px;
      font-size: 13px;
      width: 260px;
      outline: none;
      transition: border-color 0.2s;
    }
    .header-search input:focus { border-color: var(--accent); }
    .header-search input::placeholder { color: var(--text3); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    .header-count {
      font-size: 12px; color: var(--text3);
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* FILTERS */
    .filters {
      padding: 16px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* MAIN */
    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    /* PLUGIN GROUP */
    .plugin-group { margin-bottom: 40px; }
    .plugin-group[hidden] { display: none; }
    .plugin-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .plugin-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .plugin-name {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text2);
    }
    .plugin-skill-count {
      font-size: 11px; color: var(--text3);
      background: var(--surface);
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* SKILLS GRID */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    /* SKILL CARD */
    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .skill-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124,106,247,0.1);
    }
    .skill-card[hidden] { display: none; }
    .skill-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--card-color, var(--accent));
      opacity: 0.6;
    }
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      margin-bottom: 10px;
    }
    .card-name {
      font-size: 14px; font-weight: 700;
      color: var(--text); line-height: 1.3;
    }
    .card-command {
      font-size: 11px; font-family: 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg3);
      color: var(--accent2);
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-desc {
      font-size: 12px; color: var(--text2);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .card-bullets {
      list-style: none;
      display: flex; flex-direction: column; gap: 5px;
    }
    .card-bullets li {
      font-size: 12px; color: var(--text2);
      display: flex; gap: 8px; align-items: flex-start;
      line-height: 1.4;
    }
    .card-bullets li::before {
      content: '›';
      color: var(--card-color, var(--accent));
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 0px;
    }

    /* NO RESULTS */
    .no-results {
      text-align: center; padding: 60px 20px;
      color: var(--text3); font-size: 14px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text3);
      font-size: 11px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    footer span { color: var(--accent2); }

    @media (max-width: 640px) {
      header { padding: 14px 16px; flex-wrap: wrap; }
      .header-search input { width: 200px; }
      main { padding: 20px 16px; }
      .filters { padding: 12px 16px; }
    }
  </style>
</head>

// =====================================================================
// RENDER
// =====================================================================

function render() {
  const main = document.getElementById('main');
  const filters = document.getElementById('filters');
  let totalSkills = 0;

  PLUGINS.forEach(plugin => {
    totalSkills += plugin.skills.length;

    // Filter button
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = plugin.name;
    btn.onclick = function() { filterPlugin(plugin.id, this); };
    btn.dataset.plugin = plugin.id;
    filters.appendChild(btn);

    // Group
    const group = document.createElement('div');
    group.className = 'plugin-group';
    group.dataset.plugin = plugin.id;

    const header = document.createElement('div');
    header.className = 'plugin-header';
    header.innerHTML = `
      <div class="plugin-dot" style="background:${plugin.color}"></div>
      <div class="plugin-name">${plugin.name}</div>
      <div class="plugin-skill-count">${plugin.skills.length} skill${plugin.skills.length > 1 ? 's' : ''}</div>
    `;
    group.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'skills-grid';

    plugin.skills.forEach(skill => {
      const card = document.createElement('div');
      card.className = 'skill-card';
      card.style.setProperty('--card-color', plugin.color);
      card.dataset.name = (skill.name + ' ' + skill.command + ' ' + skill.desc + ' ' + skill.bullets.join(' ')).toLowerCase();

      card.innerHTML = `
        <div class="card-top">
          <div class="card-name">${skill.name}</div>
          <div class="card-command">${skill.command}</div>
        </div>
        <div class="card-desc">${skill.desc}</div>
        <ul class="card-bullets">
          ${skill.bullets.map(b => `<li>${b}</li>`).join('')}
        </ul>
      `;
      grid.appendChild(card);
    });

    group.appendChild(grid);
    main.appendChild(group);
  });

  document.getElementById('total-count').textContent = totalSkills;
  document.getElementById('updated-date').textContent = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('.skill-card:not([hidden])').length;
  document.getElementById('count').textContent = `${visible} skills`;
}

function filterPlugin(pluginId, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.plugin-group').forEach(g => {
    if (pluginId === 'all' || g.dataset.plugin === pluginId) {
      g.removeAttribute('hidden');
    } else {
      g.setAttribute('hidden', '');
    }
  });

  // Clear search
  document.getElementById('search').value = '';
  document.querySelectorAll('.skill-card').forEach(c => c.removeAttribute('hidden'));
  document.getElementById('no-results').style.display = 'none';
  updateCount();
}

function filterSkills() {
  const q = document.getElementById('search').value.toLowerCase().trim();

  // Reset plugin filter
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[onclick*="all"]').classList.add('active');
  document.querySelectorAll('.plugin-group').forEach(g => g.removeAttribute('hidden'));

  if (!q) {
    document.querySelectorAll('.skill-card').forEach(c => c.removeAttribute('hidden'));
    document.getElementById('no-results').style.display = 'none';
    updateCount();
    return;
  }

  let anyVisible = false;
  document.querySelectorAll('.skill-card').forEach(card => {
    if (card.dataset.name.includes(q)) {
      card.removeAttribute('hidden');
      anyVisible = true;
    } else {
      card.setAttribute('hidden', '');
    }
  });

  // Hide empty groups
  document.querySelectorAll('.plugin-group').forEach(group => {
    const hasVisible = group.querySelectorAll('.skill-card:not([hidden])').length > 0;
    if (!hasVisible) group.setAttribute('hidden', '');
  });

  document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
  document.getElementById('search-term').textContent = q;
  updateCount();
}

render();
</script>
