<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Dashboard — Claude Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:          #050509;
      --bg2:         #09090f;
      --surface:     rgba(255,255,255,0.025);
      --surface-h:   rgba(255,255,255,0.045);
      --border:      rgba(255,255,255,0.07);
      --border-h:    rgba(124,211,255,0.35);
      --accent:      #7cd3ff;
      --accent-dim:  rgba(124,211,255,0.12);
      --text:        #f0f0fa;
      --text-2:      #8080a8;
      --text-3:      #3c3c60;
      --radius:      14px;
      --font-display:'Syne', sans-serif;
      --font-mono:   'JetBrains Mono', monospace;
      --font-body:   'DM Sans', sans-serif;
    }

    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── DOT GRID BACKGROUND ────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 26px 26px;
    }
    /* Glow spotlight top-right */
    body::after {
      content: '';
      position: fixed; top: -200px; right: -200px;
      width: 600px; height: 600px; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(124,211,255,0.06) 0%, transparent 70%);
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(5,5,9,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; gap: 20px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .logo-mark {
      width: 34px; height: 34px;
      border: 1.5px solid var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 15px; font-weight: 600;
      color: var(--accent);
      letter-spacing: -1px;
      box-shadow: 0 0 16px rgba(124,211,255,0.12);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo-sub {
      font-size: 11px; color: var(--text-3);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    /* Search */
    .search-wrap {
      margin-left: auto;
      position: relative;
      flex-shrink: 0;
    }
    .search-wrap input {
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 40px 9px 38px;
      font-size: 13px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,211,255,0.08);
    }
    .search-wrap input::placeholder { color: var(--text-3); }
    .search-ico {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); font-size: 13px; pointer-events: none;
    }
    .search-hint {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-3); background: var(--bg2);
      border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 5px;
      pointer-events: none;
      transition: opacity .2s;
    }
    .search-wrap input:focus + .search-ico ~ .search-hint { opacity: 0; }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      display: none; cursor: pointer;
      color: var(--text-2); font-size: 16px;
      line-height: 1; padding: 2px;
    }
    .search-clear.visible { display: block; }

    /* Stats pill */
    .stat-pill {
      font-family: var(--font-mono);
      font-size: 11px; color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .stat-pill b { color: var(--accent); }

    /* ─── FILTERS ────────────────────────────────────────── */
    .filters-bar {
      position: sticky; top: 64px; z-index: 40;
      background: rgba(5,5,9,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 10px 32px;
      display: flex; gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters-bar::-webkit-scrollbar { display: none; }
    .f-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-size: 12px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .f-btn:hover { border-color: rgba(124,211,255,0.25); color: var(--text); }
    .f-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #050509;
      font-weight: 600;
    }
    .f-btn .count {
      font-family: var(--font-mono);
      font-size: 10px;
      background: rgba(255,255,255,0.15);
      padding: 1px 5px;
      border-radius: 10px;
    }
    .f-btn.active .count { background: rgba(0,0,0,0.2); }

    /* ─── MAIN ───────────────────────────────────────────── */
    main {
      position: relative; z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 36px 32px 60px;
    }

    /* ─── PLUGIN GROUP ───────────────────────────────────── */
    .p-group { margin-bottom: 52px; }
    .p-group[hidden] { display: none; }
    .p-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .p-indicator {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
    }
    .p-name {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--text-2);
    }
    .p-count {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-3);
    }
    .p-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ─── GRID ───────────────────────────────────────────── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    /* ─── SKILL CARD ─────────────────────────────────────── */
    .s-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
      /* Entrance animation */
      opacity: 0;
      animation: fadeUp .4s ease forwards;
    }
    .s-card:hover {
      background: var(--surface-h);
      border-color: var(--border-h);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,211,255,0.05);
    }
    .s-card[hidden] { display: none !important; }

    /* Colored left border */
    .s-card::before {
      content: '';
      position: absolute; left: 0; top: 16px; bottom: 16px;
      width: 3px;
      background: var(--plugin-color, var(--accent));
      border-radius: 0 3px 3px 0;
      opacity: .7;
      transition: opacity .2s;
    }
    .s-card:hover::before { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      margin-bottom: 8px;
      padding-left: 12px;
    }
    .card-name {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
      color: var(--text); line-height: 1.3;
    }

    /* Command badge — click to copy */
    .card-cmd {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 600;
      color: var(--plugin-color, var(--accent));
      background: rgba(124,211,255,0.06);
      border: 1px solid rgba(124,211,255,0.15);
      padding: 4px 9px;
      border-radius: 7px;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      user-select: none;
    }
    .card-cmd:hover {
      background: rgba(124,211,255,0.12);
      border-color: rgba(124,211,255,0.4);
    }
    .card-cmd:active { transform: scale(0.96); }
    .card-cmd.copied {
      color: #4ade80;
      border-color: rgba(74,222,128,0.4);
      background: rgba(74,222,128,0.08);
    }

    .card-desc {
      font-size: 12px; font-weight: 400;
      color: var(--text-2);
      line-height: 1.5;
      margin-bottom: 10px;
      padding-left: 12px;
    }

    .card-bullets {
      list-style: none;
      display: flex; flex-direction: column; gap: 4px;
      padding-left: 12px;
    }
    .card-bullets li {
      font-size: 11.5px; color: var(--text-2);
      display: flex; gap: 8px; align-items: flex-start;
      line-height: 1.45;
    }
    .card-bullets li::before {
      content: '›';
      color: var(--plugin-color, var(--accent));
      font-weight: 700; font-size: 14px;
      flex-shrink: 0; line-height: 1.2;
      opacity: .7;
    }

    /* ─── TOAST ──────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #0e1a12; border: 1px solid rgba(74,222,128,0.3);
      color: #4ade80;
      font-family: var(--font-mono); font-size: 12px;
      padding: 10px 18px; border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── NO RESULTS ─────────────────────────────────────── */
    .empty {
      display: none;
      text-align: center;
      padding: 80px 20px;
      z-index: 1; position: relative;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .3; }
    .empty-title {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 800;
      color: var(--text-2); margin-bottom: 6px;
    }
    .empty-sub { font-size: 13px; color: var(--text-3); }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 11px; color: var(--text-3);
      border-top: 1px solid var(--border);
    }
    footer .hl { color: var(--accent); }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 680px) {
      header { padding: 0 16px; gap: 10px; }
      .logo-sub { display: none; }
      .search-wrap input { width: 180px; }
      .stat-pill { display: none; }
      main { padding: 24px 16px 40px; }
      .filters-bar { padding: 8px 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">⌘</div>
    <div>
      <div class="logo-text">Skills</div>
      <div class="logo-sub">claude code</div>
    </div>
  </div>

  <div class="stat-pill" id="stat-pill">
    <b id="stat-skills">0</b> skills · <b id="stat-plugins">0</b> plugins
  </div>

  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input type="text" id="search" placeholder="Buscar skill ou comando..." autocomplete="off" />
    <span class="search-hint">pressione /</span>
    <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
  </div>
</header>

<!-- FILTERS -->
<div class="filters-bar" id="filters-bar">
  <button class="f-btn active" data-plugin="all" onclick="filterPlugin('all', this)">
    Todos <span class="count" id="count-all">0</span>
  </button>
</div>

<!-- MAIN -->
<main id="main"></main>

<!-- EMPTY STATE -->
<div class="empty" id="empty">
  <div class="empty-icon">⌖</div>
  <div class="empty-title">Nada encontrado</div>
  <div class="empty-sub">Tente outro termo ou instale uma nova skill</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<footer>
  Atualizado em <span class="hl" id="updated"></span> · <span class="hl" id="footer-count">0</span> skills instaladas
</footer>

<script>
/* ================================================================
   DADOS — adicione novas skills aqui ao instalar
   ================================================================ */

  {

    color: '#a78bfa',
    skills: [

          'Transforma ideias em specs completas via diálogo colaborativo',
          'Faz perguntas uma de cada vez para refinar o design',
          'Propõe 2–3 abordagens com trade-offs e recomendação',
          'Exige aprovação antes de qualquer código',
          'Salva doc de design em docs/superpowers/specs/',
        ]

      {
        name: 'Planejamento',
        command: '/writing-plans',
        desc: 'Escrever planos de implementação detalhados antes de tocar em código',
        bullets: [

          'Divide o trabalho em tarefas granulares e sequenciais',

          'Aplica princípios DRY, YAGNI e TDD',
        ]
      },
      {
        name: 'Executar Planos',
        command: '/executing-plans',

      {
        name: 'Subagent Dev',
        command: '/subagent-driven-development',
        desc: 'Executar planos via subagent dedicado por tarefa com revisão dupla',
        bullets: [
          'Um subagent fresco por tarefa independente',
          'Revisão em dois estágios: spec + qualidade de código',
          'Preserva contexto do agente principal para coordenação',
        ]
      },
      {
        name: 'Parallel Agents',
        command: '/dispatching-parallel-agents',
        desc: 'Delegar 2+ tarefas independentes para agentes paralelos',
        bullets: [
          'Identifica quando tarefas são verdadeiramente independentes',
          'Cria subagents com contexto isolado e preciso',
          'Ideal para múltiplas falhas em subsistemas diferentes',
        ]
      },
      {
        name: 'TDD',
        command: '/test-driven-development',
        desc: 'Escrever o teste primeiro, ver falhar, depois implementar',

      {
        name: 'Debug Sistemático',
        command: '/systematic-debugging',
        desc: 'Encontrar a causa raiz antes de propor qualquer correção',
        bullets: [
          'Lei de ferro: sem correção sem causa raiz identificada',
          'Fases: reproduzir → isolar → identificar → corrigir',

      },
      {
        name: 'Verificação Final',

          'Proibido afirmar "pronto" sem evidência recente de verificação',

      {
        name: 'Solicitar Code Review',

      {
        name: 'Receber Code Review',

      {
        name: 'Fechar Branch',

  {
    id: 'thedotmack',

  {
    id: 'playwright',
    name: 'Playwright',
    color: '#4ade80',
    skills: [
      {
        name: 'Playwright Skill',
        command: '/playwright-skill',

/* ================================================================
   RENDER
   ================================================================ */
let activePlugin = 'all';
let searchQuery = '';
let toastTimer;

function render() {
  const main = document.getElementById('main');
  const filtersBar = document.getElementById('filters-bar');
  let totalSkills = 0;
  let delay = 0;

  PLUGINS.forEach(plugin => {
    totalSkills += plugin.skills.length;

    // Filter button
    const btn = document.createElement('button');
    btn.className = 'f-btn';
    btn.dataset.plugin = plugin.id;
    btn.onclick = function() { filterPlugin(plugin.id, this); };
    btn.innerHTML = `${plugin.name} <span class="count">${plugin.skills.length}</span>`;
    filtersBar.appendChild(btn);

    // Plugin group
    const group = document.createElement('div');
    group.className = 'p-group';
    group.dataset.plugin = plugin.id;

    // Plugin header
    const ph = document.createElement('div');
    ph.className = 'p-header';
    ph.innerHTML = `
      <div class="p-indicator" style="background:${plugin.color};color:${plugin.color}"></div>
      <div class="p-name">${plugin.name}</div>
      <div class="p-count">${plugin.skills.length} skill${plugin.skills.length > 1 ? 's' : ''}</div>
      <div class="p-line"></div>
    `;
    group.appendChild(ph);

    // Skills grid
    const grid = document.createElement('div');
    grid.className = 'skills-grid';

    plugin.skills.forEach(skill => {
      delay += 35;
      const card = document.createElement('div');
      card.className = 's-card';
      card.style.setProperty('--plugin-color', plugin.color);
      card.style.animationDelay = `${delay}ms`;
      card.dataset.search = (skill.name + ' ' + skill.command + ' ' + skill.desc + ' ' + skill.bullets.join(' ')).toLowerCase();

      card.innerHTML = `
        <div class="card-head">
          <div class="card-name">${skill.name}</div>
          <div class="card-cmd" title="Clique para copiar" onclick="copyCmd('${skill.command}', this)">${skill.command}</div>
        </div>
        <div class="card-desc">${skill.desc}</div>
        <ul class="card-bullets">
          ${skill.bullets.map(b => `<li>${b}</li>`).join('')}
        </ul>
      `;
      grid.appendChild(card);
    });

    group.appendChild(grid);
    main.appendChild(group);
  });

  // Stats
  document.getElementById('stat-skills').textContent = totalSkills;
  document.getElementById('stat-plugins').textContent = PLUGINS.length;
  document.getElementById('count-all').textContent = totalSkills;
  document.getElementById('footer-count').textContent = totalSkills;
  document.getElementById('updated').textContent = new Date().toLocaleDateString('pt-BR');
}

function copyCmd(cmd, el) {
  navigator.clipboard.writeText(cmd).then(() => {
    el.classList.add('copied');
    el.textContent = '✓ copiado';
    setTimeout(() => {
      el.classList.remove('copied');
      el.textContent = cmd;
    }, 1500);
    showToast(`${cmd} copiado para a área de transferência`);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function filterPlugin(pluginId, btn) {
  activePlugin = pluginId;
  searchQuery = '';
  document.getElementById('search').value = '';
  document.getElementById('search-clear').classList.remove('visible');

  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  applyFilters();
}

function applyFilters() {
  let visibleCount = 0;

  document.querySelectorAll('.p-group').forEach(group => {
    const matchPlugin = activePlugin === 'all' || group.dataset.plugin === activePlugin;
    if (!matchPlugin) { group.hidden = true; return; }

    let groupHasVisible = false;
    group.querySelectorAll('.s-card').forEach(card => {
      const matchSearch = !searchQuery || card.dataset.search.includes(searchQuery);
      card.hidden = !matchSearch;
      if (matchSearch) { groupHasVisible = true; visibleCount++; }
    });

    group.hidden = !groupHasVisible;
  });

  document.getElementById('empty').style.display = visibleCount === 0 ? 'block' : 'none';
  document.getElementById('count-all').textContent = visibleCount;
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  searchQuery = '';
  applyFilters();
}

// ── SEARCH INPUT
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  const clear = document.getElementById('search-clear');
  clear.classList.toggle('visible', searchQuery.length > 0);

  // Reset plugin filter when searching
  if (searchQuery) {
    activePlugin = 'all';
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-plugin="all"]').classList.add('active');
  }
  applyFilters();
});

// ── KEYBOARD SHORTCUTS
document.addEventListener('keydown', e => {
  const inp = document.getElementById('search');
  if (e.key === '/' && document.activeElement !== inp) {
    e.preventDefault();
    inp.focus();
  }
  if (e.key === 'Escape' && document.activeElement === inp) {
    clearSearch();
    inp.blur();
  }
});

render();
</script>
