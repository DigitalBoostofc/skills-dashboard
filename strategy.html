<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estratégia — Claude Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #050509;
      --surface:   rgba(255,255,255,0.025);
      --surface-h: rgba(255,255,255,0.045);
      --border:    rgba(255,255,255,0.07);
      --text:      #f0f0fa;
      --text-2:    #8080a8;
      --text-3:    #3c3c60;
      --radius:    14px;
      --cat-color: #7cd3ff;
      --ff-display:'Syne', sans-serif;
      --ff-mono:   'JetBrains Mono', monospace;
      --ff-body:   'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(5,5,9,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 62px;
      display: flex; align-items: center; gap: 14px;
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text-2);
      font-family: var(--ff-mono); font-size: 12px;
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      transition: color .15s, border-color .15s, background .15s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); background: var(--surface-h); }
    .breadcrumb {
      font-family: var(--ff-mono); font-size: 12px; color: var(--text-3);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .breadcrumb .sep { margin: 0 6px; }
    .breadcrumb .crumb { color: var(--text-2); }

    main {
      position: relative; z-index: 1;
      max-width: 960px; margin: 0 auto;
      padding: 48px 32px 100px;
    }

    .hero { margin-bottom: 40px; }
    .hero-top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .cat-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--cat-color);
      background: color-mix(in srgb, var(--cat-color) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--cat-color) 25%, transparent);
      padding: 4px 10px; border-radius: 20px;
    }
    .meta-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-2);
      background: var(--surface); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
    }
    .difficulty-easy   { color: #4ade80; border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.06); }
    .difficulty-medium { color: #fbbf24; border-color: rgba(251,191,36,.3); background: rgba(251,191,36,.06); }
    .difficulty-hard   { color: #f87171; border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.06); }

    .hero-title-row { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
    .hero-icon {
      width: 72px; height: 72px; flex-shrink: 0;
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      background: color-mix(in srgb, var(--cat-color) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--cat-color) 30%, transparent);
    }
    .strategy-title {
      font-family: var(--ff-display);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800; letter-spacing: -.03em;
      color: var(--text); line-height: 1.05;
    }
    .strategy-tagline {
      font-size: 16px; color: var(--text-2);
      margin-top: 6px;
    }
    .strategy-description {
      font-size: 15px; color: var(--text-2); line-height: 1.65;
      max-width: 720px;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--cat-color);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-top: 18px;
    }

    .outcome-card {
      background: rgba(74,222,128,0.05);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-top: 14px;
      display: flex; gap: 12px; align-items: center;
    }
    .outcome-icon { font-size: 20px; flex-shrink: 0; }
    .outcome-label {
      font-family: var(--ff-mono); font-size: 10px;
      font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      color: #4ade80; margin-bottom: 4px;
    }
    .outcome-text { font-size: 14px; color: #a7f3d0; line-height: 1.5; }

    .section { margin-bottom: 36px; margin-top: 40px; }
    .section-title {
      font-family: var(--ff-display);
      font-size: 13px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::before {
      content: ''; width: 18px; height: 2px;
      background: var(--cat-color); opacity: .5;
    }

    /* ── PHASES ── */
    .phase {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 14px;
      position: relative;
    }
    .phase::before {
      content: attr(data-num);
      position: absolute; top: 24px; right: 24px;
      font-family: var(--ff-display);
      font-size: 48px; font-weight: 800;
      color: var(--cat-color);
      opacity: .18; line-height: 1;
    }
    .phase-head { margin-bottom: 18px; padding-right: 50px; }
    .phase-name {
      font-family: var(--ff-display);
      font-size: 20px; font-weight: 700;
      color: var(--text); letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .phase-desc {
      font-size: 13px; color: var(--text-2); line-height: 1.5;
    }

    .steps { display: flex; flex-direction: column; gap: 8px; }
    .step {
      display: grid;
      grid-template-columns: auto auto 1fr;
      gap: 14px; align-items: center;
      background: rgba(0,0,0,.25);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      text-decoration: none;
      color: inherit;
    }
    .step:hover {
      background: rgba(0,0,0,.35);
      border-color: color-mix(in srgb, var(--cat-color) 30%, transparent);
      transform: translateX(3px);
    }
    .step-agent {
      font-family: var(--ff-mono); font-size: 12px; font-weight: 600;
      color: var(--text-2);
      background: var(--surface-h);
      padding: 4px 10px; border-radius: 6px;
      white-space: nowrap;
      border: 1px solid var(--border);
    }
    .step-cmd {
      font-family: var(--ff-mono); font-size: 12px; font-weight: 600;
      color: var(--cat-color);
      background: color-mix(in srgb, var(--cat-color) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--cat-color) 25%, transparent);
      padding: 4px 10px; border-radius: 6px;
      white-space: nowrap;
    }
    .step-purpose {
      font-size: 13px; color: var(--text-2); line-height: 1.4;
    }

    @media (max-width: 680px) {
      header { padding: 0 16px; }
      .breadcrumb { display: none; }
      main { padding: 32px 16px 60px; }
      .hero-title-row { flex-direction: column; align-items: flex-start; }
      .phase::before { font-size: 36px; top: 18px; right: 18px; }
      .step { grid-template-columns: 1fr; gap: 8px; }
      .step-agent, .step-cmd { width: fit-content; }
    }

    .not-found { text-align: center; padding: 100px 20px; }
    .not-found-title {
      font-family: var(--ff-display); font-size: 24px; font-weight: 800;
      color: var(--text-2); margin-bottom: 10px;
    }
    .not-found-sub { font-size: 14px; color: var(--text-3); margin-bottom: 24px; }
    .not-found-link {
      font-family: var(--ff-mono); font-size: 12px;
      color: var(--cat-color); text-decoration: none;
      border: 1px solid color-mix(in srgb, var(--cat-color) 25%, transparent);
      padding: 8px 18px; border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html#estrategias" class="back-btn">
    <span>←</span> Estratégias
  </a>
  <div class="breadcrumb">
    <span class="sep">/</span>
    <span class="crumb" id="hdr-cat">—</span>
    <span class="sep">/</span>
    <span class="crumb" id="hdr-title">—</span>
  </div>
</header>

<main id="main">
  <div class="not-found" id="not-found" style="display:none">
    <div class="not-found-title">Estratégia não encontrada</div>
    <div class="not-found-sub">Verifique o ID na URL ou volte ao dashboard.</div>
    <a href="index.html#estrategias" class="not-found-link">← Voltar</a>
  </div>
</main>

<script src="agents-data.js"></script>
<script src="strategies-data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const STRATEGY = id ? STRATEGIES_DB.find(s => s.id === id) : null;

// Índice rápido para lookup de agentes (detalhes + squad)
const AGENT_INDEX = {};
for (const a of AGENTS_DB) AGENT_INDEX[a.id] = a;

if (!STRATEGY) {
  document.getElementById('not-found').style.display = 'block';
} else {
  const cat = CATEGORIES_META[STRATEGY.category] || { name: STRATEGY.category, icon: '⚙️', color: '#7cd3ff' };
  document.documentElement.style.setProperty('--cat-color', cat.color);

  document.title = `${STRATEGY.title} — Estratégias`;
  document.getElementById('hdr-cat').textContent = cat.name;
  document.getElementById('hdr-title').textContent = STRATEGY.title;

  const main = document.getElementById('main');
  const diffLabel = {easy:'Fácil', medium:'Médio', hard:'Difícil'}[STRATEGY.difficulty] || STRATEGY.difficulty;

  const sections = [];

  // Hero
  sections.push(`
    <div class="hero">
      <div class="hero-top">
        <span class="cat-pill">${cat.icon} ${esc(cat.name)}</span>
        <span class="meta-pill">⏱ ${esc(STRATEGY.timeEstimate)}</span>
        <span class="meta-pill difficulty-${STRATEGY.difficulty}">◆ ${esc(diffLabel)}</span>
      </div>
      <div class="hero-title-row">
        <div class="hero-icon">${STRATEGY.icon}</div>
        <div>
          <h1 class="strategy-title">${esc(STRATEGY.title)}</h1>
          <div class="strategy-tagline">${esc(STRATEGY.tagline)}</div>
        </div>
      </div>
      <p class="strategy-description">${esc(STRATEGY.description)}</p>
      ${STRATEGY.outcome ? `
        <div class="outcome-card">
          <div class="outcome-icon">🎯</div>
          <div>
            <div class="outcome-label">Resultado esperado</div>
            <div class="outcome-text">${esc(STRATEGY.outcome)}</div>
          </div>
        </div>
      ` : ''}
    </div>
  `);

  // Phases
  sections.push(`<div class="section-title">Fases do playbook</div>`);
  STRATEGY.phases.forEach((phase, i) => {
    const stepsHtml = phase.steps.map(step => {
      const agent = AGENT_INDEX[step.agent];
      const agentLabel = agent ? `${agent.icon} ${agent.name}` : step.agent;
      const href = agent ? `agent.html?id=${encodeURIComponent(step.agent)}` : '#';
      return `
        <a class="step" href="${href}" title="Abrir ${esc(agent ? agent.name : step.agent)}">
          <span class="step-agent">${esc(agentLabel)}</span>
          <span class="step-cmd">${esc(step.command)}</span>
          <span class="step-purpose">${esc(step.purpose)}</span>
        </a>
      `;
    }).join('');

    sections.push(`
      <div class="phase" data-num="${String(i+1).padStart(2,'0')}">
        <div class="phase-head">
          <div class="phase-name">${esc(phase.name)}</div>
          <div class="phase-desc">${esc(phase.description || '')}</div>
        </div>
        <div class="steps">${stepsHtml}</div>
      </div>
    `);
  });

  main.innerHTML = sections.join('');
}

function esc(str) {
  return String(str == null ? '' : str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
